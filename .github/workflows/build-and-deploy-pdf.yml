name: Build and Deploy Paper PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Compile manuscript
        uses: xu-cheng/latex-action@v4
        with:
          root_file: sn-article.tex
          os: debian

      - name: Prepare Pages site
        run: |
          mkdir -p _site
          cp sn-article.pdf _site/paper.pdf
          cp sn-article.pdf _site/sn-article.pdf
          touch _site/.nojekyll
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>speech-247 manuscript</title>
            <style>
              :root {
                color-scheme: light;
                --bg: #f4f1ea;
                --panel: #fffdf8;
                --ink: #1f1c18;
                --muted: #5d554c;
                --accent: #8f2d1f;
                --accent-dark: #6f2217;
                --line: #d7cdc0;
              }

              * {
                box-sizing: border-box;
              }

              body {
                margin: 0;
                min-height: 100vh;
                font-family: Georgia, "Times New Roman", serif;
                background:
                  radial-gradient(circle at top left, rgba(143, 45, 31, 0.12), transparent 32rem),
                  linear-gradient(180deg, #f7f3ec 0%, var(--bg) 100%);
                color: var(--ink);
                display: grid;
                place-items: center;
                padding: 2rem;
              }

              main {
                width: min(42rem, 100%);
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 1.25rem;
                padding: 2.5rem;
                box-shadow: 0 1rem 3rem rgba(31, 28, 24, 0.08);
              }

              h1 {
                margin: 0 0 0.75rem;
                font-size: clamp(2rem, 4vw, 3rem);
                line-height: 1.05;
              }

              p {
                margin: 0 0 1rem;
                font-size: 1.05rem;
                line-height: 1.7;
                color: var(--muted);
              }

              .actions {
                display: flex;
                flex-wrap: wrap;
                gap: 0.9rem;
                margin: 1.75rem 0 1rem;
              }

              .button {
                display: inline-block;
                padding: 0.9rem 1.2rem;
                border-radius: 999px;
                text-decoration: none;
                font-weight: 700;
                border: 1px solid var(--accent);
              }

              .button.primary {
                background: var(--accent);
                color: #fff8f4;
              }

              .button.primary:hover {
                background: var(--accent-dark);
              }

              .button.secondary {
                color: var(--accent);
                background: transparent;
              }

              .button.secondary:hover {
                background: rgba(143, 45, 31, 0.06);
              }

              code {
                font-size: 0.95em;
                background: rgba(31, 28, 24, 0.05);
                padding: 0.15rem 0.35rem;
                border-radius: 0.3rem;
              }
            </style>
          </head>
          <body>
            <main>
              <h1>Latest manuscript PDF</h1>
              <p>
                This page always serves the most recent PDF built from the repository's
                <code>main</code> branch.
              </p>
              <div class="actions">
                <a class="button primary" href="./paper.pdf">Open PDF</a>
                <a class="button secondary" href="./paper.pdf" download>Download PDF</a>
              </div>
              <p>
                Direct PDF link: <a href="./paper.pdf">paper.pdf</a>
              </p>
            </main>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
